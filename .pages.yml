media:
  - name: images
    label: Images du Blog
    input: assets/img/blog
    output: /assets/img/blog

content:
  - name: posts
    label: Articles de Blog
    type: collection
    path: content/blog
    filename: '{year}-{month}-{day}-{fields.slug}.md'
    format: yaml-frontmatter
    view:
      primary: title
      fields: [title, date, slug, draft, category]
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: category
        label: Catégorie
        type: select
        options:
          values: [Peinture, Façade, Toiture, Rénovation, Conseils, Entretien]
          default: Conseils
      - name: title
        label: Titre de l'article (H1)
        type: string
        required: true
      - name: slug
        label: Slug (URL)
        type: string
        required: true
      - name: description
        label: Description SEO (Meta)
        type: text
        required: true
      - name: date
        label: Date de publication
        type: date
        required: true
      - name: image
        label: Image de couverture
        type: image
      - name: draft
        label: Brouillon
        type: boolean
        default: false
      - name: tags
        label: Tags
        type: string
        list:
          collapsible: false
      - name: readtime
        label: Temps de lecture (min)
        type: number
        default: 5
      - name: body
        label: Contenu de l'article
        type: rich-text
